name: tick

on:
  schedule:
    # daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      dataset:
        description: "Dataset to tick (or 'all')"
        required: false
        default: "all"

permissions:
  contents: write

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        dataset: [mcp-servers, ai-promises, ai-models, elon-tweets, blindspot-briefs, agent-networks, agent-wallets]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install OpenCode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Install frame CLI
        # install once globally so better-sqlite3 native binding builds reliably
        # (npx -y can skip postinstall and leave the binding missing)
        run: npm i -g @frames-ag/frame@latest

      - name: Install skills
        run: |
          npx skills add https://github.com/frames-engineering/skills --skill agentwallet -y
          npx skills add https://github.com/frames-engineering/skills --skill registry -y
          npx skills add https://github.com/microchipgnu/blindspot.news --skill analysis -y

      - name: Setup credentials
        env:
          AGENTWALLET_USERNAME: ${{ secrets.AGENTWALLET_USERNAME }}
          AGENTWALLET_API_TOKEN: ${{ secrets.AGENTWALLET_API_TOKEN }}
        run: |
          for secret in "$AGENTWALLET_USERNAME" "$AGENTWALLET_API_TOKEN"; do
            if [ -n "$secret" ]; then
              echo "::add-mask::$secret"
            fi
          done

          mkdir -p ~/.agentwallet
          printf '{"username":"%s","apiToken":"%s"}' "$AGENTWALLET_USERNAME" "$AGENTWALLET_API_TOKEN" > ~/.agentwallet/config.json
          chmod 600 ~/.agentwallet/config.json

          mkdir -p .agentwallet
          cp ~/.agentwallet/config.json .agentwallet/config.json
          chmod 600 .agentwallet/config.json

          export FRAMES_API_KEY="${AGENTWALLET_USERNAME}:${AGENTWALLET_API_TOKEN}"
          echo "FRAMES_API_KEY=$FRAMES_API_KEY" >> $GITHUB_ENV
          echo "::add-mask::$FRAMES_API_KEY"

      - name: Configure git
        run: |
          git config user.name "frames-bot"
          git config user.email "frames-bot@users.noreply.github.com"

      - name: Tick ${{ matrix.dataset }}
        id: tick
        if: ${{ github.event.inputs.dataset == '' || github.event.inputs.dataset == 'all' || github.event.inputs.dataset == matrix.dataset }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AGENTWALLET_USERNAME: ${{ secrets.AGENTWALLET_USERNAME }}
          AGENTWALLET_API_TOKEN: ${{ secrets.AGENTWALLET_API_TOKEN }}
        timeout-minutes: 55
        run: |
          opencode run --dangerously-skip-permissions --print-logs "$(cat datasets/${{ matrix.dataset }}/prompt.md)"

      # Verify the events log is referentially sound before projecting.
      # continue-on-error: a bad log must not skip the events.ndjson commit below
      # (preserving work is the whole point — a corrupt log is debuggable later).
      - name: Verify events
        id: verify
        if: steps.tick.outcome == 'success'
        continue-on-error: true
        run: frame verify datasets/${{ matrix.dataset }}

      # events.ndjson is the protocol-declared source of truth. Commit it before
      # attempting projection so a downstream failure cannot lose the agent's work.
      - name: Commit events.ndjson
        if: steps.tick.outcome == 'success'
        run: |
          git add datasets/${{ matrix.dataset }}/events.ndjson || true
          if ! git diff --cached --quiet; then
            git commit -m "tick(${{ matrix.dataset }}): events $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase || true
            git push
          fi

      - name: Regenerate index
        id: project
        if: steps.verify.outcome == 'success'
        run: frame project datasets/${{ matrix.dataset }}

      - name: Commit projection
        if: steps.project.outcome == 'success'
        run: |
          git add datasets/${{ matrix.dataset }}/.frame || true
          if ! git diff --cached --quiet; then
            git commit -m "tick(${{ matrix.dataset }}): projection $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase || true
            git push
          fi

      # On verify or project failure, save the runner's events.ndjson as an
      # artifact so the next failure is debuggable (the May 2 incident vanished
      # because the runner's working copy was wiped before anything was uploaded).
      - name: Upload events.ndjson on failure
        if: ${{ steps.tick.outcome == 'success' && (steps.verify.outcome == 'failure' || steps.project.outcome == 'failure') }}
        uses: actions/upload-artifact@v4
        with:
          name: events-${{ matrix.dataset }}-${{ github.run_id }}
          path: datasets/${{ matrix.dataset }}/events.ndjson
          if-no-files-found: warn

      # Surface verify/project failures as job failures so they're visible in the
      # UI. The events commit above already ran, so work is preserved either way.
      - name: Report failure
        if: ${{ steps.tick.outcome == 'success' && (steps.verify.outcome == 'failure' || steps.project.outcome == 'failure') }}
        run: |
          echo "::error::verify=${{ steps.verify.outcome }} project=${{ steps.project.outcome }} — events.ndjson committed; projection is stale until fixed"
          exit 1

  # blindspot-threads reads yesterday's briefs from blindspot-briefs, so it must
  # run AFTER the briefs job pushes — otherwise its checkout misses today's
  # briefs and the prompt bails with "insufficient briefs to thread".
  tick-threads:
    needs: tick
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        dataset: [blindspot-threads]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install OpenCode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Install frame CLI
        run: npm i -g @frames-ag/frame@latest

      - name: Install skills
        run: |
          npx skills add https://github.com/frames-engineering/skills --skill agentwallet -y
          npx skills add https://github.com/frames-engineering/skills --skill registry -y
          npx skills add https://github.com/microchipgnu/blindspot.news --skill analysis -y

      - name: Setup credentials
        env:
          AGENTWALLET_USERNAME: ${{ secrets.AGENTWALLET_USERNAME }}
          AGENTWALLET_API_TOKEN: ${{ secrets.AGENTWALLET_API_TOKEN }}
        run: |
          for secret in "$AGENTWALLET_USERNAME" "$AGENTWALLET_API_TOKEN"; do
            if [ -n "$secret" ]; then
              echo "::add-mask::$secret"
            fi
          done

          mkdir -p ~/.agentwallet
          printf '{"username":"%s","apiToken":"%s"}' "$AGENTWALLET_USERNAME" "$AGENTWALLET_API_TOKEN" > ~/.agentwallet/config.json
          chmod 600 ~/.agentwallet/config.json

          mkdir -p .agentwallet
          cp ~/.agentwallet/config.json .agentwallet/config.json
          chmod 600 .agentwallet/config.json

          export FRAMES_API_KEY="${AGENTWALLET_USERNAME}:${AGENTWALLET_API_TOKEN}"
          echo "FRAMES_API_KEY=$FRAMES_API_KEY" >> $GITHUB_ENV
          echo "::add-mask::$FRAMES_API_KEY"

      - name: Configure git
        run: |
          git config user.name "frames-bot"
          git config user.email "frames-bot@users.noreply.github.com"

      - name: Tick ${{ matrix.dataset }}
        id: tick
        if: ${{ github.event.inputs.dataset == '' || github.event.inputs.dataset == 'all' || github.event.inputs.dataset == matrix.dataset }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AGENTWALLET_USERNAME: ${{ secrets.AGENTWALLET_USERNAME }}
          AGENTWALLET_API_TOKEN: ${{ secrets.AGENTWALLET_API_TOKEN }}
        timeout-minutes: 55
        run: |
          opencode run --dangerously-skip-permissions --print-logs "$(cat datasets/${{ matrix.dataset }}/prompt.md)"

      - name: Verify events
        id: verify
        if: steps.tick.outcome == 'success'
        continue-on-error: true
        run: frame verify datasets/${{ matrix.dataset }}

      - name: Commit events.ndjson
        if: steps.tick.outcome == 'success'
        run: |
          git add datasets/${{ matrix.dataset }}/events.ndjson || true
          if ! git diff --cached --quiet; then
            git commit -m "tick(${{ matrix.dataset }}): events $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase || true
            git push
          fi

      - name: Regenerate index
        id: project
        if: steps.verify.outcome == 'success'
        run: frame project datasets/${{ matrix.dataset }}

      - name: Commit projection
        if: steps.project.outcome == 'success'
        run: |
          git add datasets/${{ matrix.dataset }}/.frame || true
          if ! git diff --cached --quiet; then
            git commit -m "tick(${{ matrix.dataset }}): projection $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase || true
            git push
          fi

      - name: Upload events.ndjson on failure
        if: ${{ steps.tick.outcome == 'success' && (steps.verify.outcome == 'failure' || steps.project.outcome == 'failure') }}
        uses: actions/upload-artifact@v4
        with:
          name: events-${{ matrix.dataset }}-${{ github.run_id }}
          path: datasets/${{ matrix.dataset }}/events.ndjson
          if-no-files-found: warn

      - name: Report failure
        if: ${{ steps.tick.outcome == 'success' && (steps.verify.outcome == 'failure' || steps.project.outcome == 'failure') }}
        run: |
          echo "::error::verify=${{ steps.verify.outcome }} project=${{ steps.project.outcome }} — events.ndjson committed; projection is stale until fixed"
          exit 1
